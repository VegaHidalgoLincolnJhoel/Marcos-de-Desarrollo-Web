<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Formulario</title>
    <link rel="stylesheet" href="principal.css">
  </head>
  <body>
    <form class="formulario" method="post">
  <div>
    <label for="nombre">Nombre:</label>
    <input class="name"
      type="text"
      id="nombre"
      name="nombre"
      placeholder="Escribe tu nombre"
      required
    >
  </div>

  <div>
    <label for="apellidos">Apellidos:</label>
    <input class="lastname"
      type="text"
      id="apellidos"
      name="apellidos"
      placeholder="Escribe tu 1er y 2do apellido"
      required
    >
  </div>

  <div>
    <label for="email">Email:</label>
    <input class="mail"
      type="email"
      id="email"
      name="email"
      placeholder="ejemplo@correo.com"
      required
    >
  </div>

  <div>
    <label for="asunto">Asunto:</label>
    <input class="matter"
      type="text"
      id="asunto"
      name="asunto"
      placeholder="titulo de la consulta"
      required
    >
  </div>

  <div>
    <label for="mensaje">Mensaje:</label><br>
    <textarea
      name="mensaje"
      id="mensaje"
      placeholder="describe brebemente en menos de 300 carácteres"
      rows="5"
      required
    ></textarea>
  </div>

  <div>
    <button type="submit">Enviar datos</button>
  </div>
</form>
  </body>
</html>
